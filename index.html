<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast" class="toast" aria-live="polite"></div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1 id="appTitle" contenteditable="true" spellcheck="false">🎯 Daily Habit Tracker</h1>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
            <p class="date" id="currentDate"></p>
        </header>

        <div class="add-habit-section">
            <input
                type="text"
                id="habitInput"
                placeholder="Enter a new habit..."
                inputmode="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="sentences"
            />
            <button id="addHabitBtn">Add</button>
        </div>

        <div id="habitsContainer" class="habits-container">
            <!-- Habits will be dynamically added here -->
        </div>

        <div id="emptyState" class="empty-state">
            <p>No habits yet. Add one above to get started! 🚀</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
